<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" href="img/favicon.png">

    <!-- Font awesome -->
    <link rel="stylesheet" href="all.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Nethub Signin</title>

    <style>
        .login, .image {
            min-height: 100vh;
        }

        .bg-image {
            background-image: url('https://bootstrapious.com/i/snippets/sn-page-split/bg.jpg');
            background-size: cover;
            background-position: center center;
        }

        .password-visibility {
            cursor: pointer;
            display: none;
        }

        a {
            text-decoration: none;
        }
        
        .form_group {
            position: relative;
            margin-bottom: 10px;
        }

        .form_group span {
            position: absolute;
            top: 5px;
            left: 15px;
            font-size: 14px;
            color: var(--text-gray-100);
        }

        .form_group input {
            width: 100%;
            padding: 25px 15px 5px;
            border-radius: 20px;
            border: none;
            background-color: #fff;
            box-shadow: 0 2px 2px #eee;
        }

        .form_group input:focus {
            outline: none;
            box-shadow: 0 0 10px #bbb;
        }

        #password, #signupPassword, #confirm_password {
            padding-right: 50px;
        }

        .blink {
            animation: blink-animation 0.5s steps(1, end) infinite;
        }

        @keyframes blink-animation {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row no-gutter">
            <!-- The image half -->
            <div class="col-md-6 d-none d-md-flex bg-image"></div>

            <!-- The content half -->
            <div class="col-md-6 bg-light">
                <div class="login d-flex align-items-center py-5">
                    <!-- Demo content-->
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-10 col-xl-7 mx-auto">
                                <p class="text-success" id="signupSuccessMsg" style="font-size: 20px;"></p>

                                <h3 class="display-4">Nethub</h3>
                                <p class="text-muted mb-4">Sign in to Nethub</p>
                                <form method="post" id="signinForm">
                                    <div class="form_group">
                                        <span>Username, Email, or Phone Number</span>
                                        <input type="text" id="verifyuser" name="verifyuser" autofocus="">
                                    </div>

                                    <div class="form_group">
                                        <span>Password</span>
                                        <input type="password" id="password" name="password">
                                        <p class="password-visibility position-absolute end-0 top-50 translate-middle-y me-2" id="signinToggle">Show</p>
                                    </div>

                                    <!-- Display error message if any -->
                                    <p class="text-danger" id="signinErrorMsg"></p>

                                    <button type="submit" class="btn btn-primary btn-block mb-2 rounded-pill shadow-sm">Sign In</button>
                                  
                                    <!-- Forgot Password link -->
                                    <div class="text-right mb-3">
                                        <a href="forgot_password.php" class="text-muted">Forgot Password?</a>
                                    </div>

                                    <!-- Sign up link -->
                                    <div class="text-center d-flex justify-content-between mt-4">
                                        <p>Don't have an account? <a href="#" data-bs-toggle="modal" data-bs-target="#signupModal" id="signup">Sign Up</a></p>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div><!-- End -->

                </div>
            </div><!-- End -->

        </div>
    </div>

    <!-- Sign Up Modal -->
    <div class="modal fade" id="signupModal" tabindex="-1" aria-labelledby="signupModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-light">
                <div class="modal-header">
                    <h5 class="modal-title" id="signupModalLabel">Sign Up</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="post" id="signupForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form_group">
                                    <span>First Name</span>
                                    <input type="text" id="firstname" name="firstname">
                                </div>
                                
                                <div class="form_group">
                                    <span>Last Name</span>
                                    <input type="text" id="lastname" name="lastname">
                                </div>
                                
                                <div class="form_group">
                                    <span>Username</span>
                                    <input type="text" class="text-lowercase" id="username" name="username" autocomplete="username">
                                </div>
                                
                                <div class="form_group">
                                    <span>Email</span>
                                    <input type="text" id="email" name="email" autocomplete="email">
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form_group dropdown">
                                    <span>Phone Number</span>
                                    <input type="tel" id="phone_number" name="phone_number" data-bs-toggle="dropdown" autocomplete="off">
                                    <!-- <input type="tel" class="dropdown-menu" id="phoneNumberDrop" aria-labelledby="phone_number"> -->
                                </div>
                                
                                <div class="form_group">
                                    <span>Birthday</span>
                                    <input type="text" id="birthday" name="birthday">
                                </div>
                                
                                <div class="form_group">
                                    <span>Password</span>
                                    <input type="password" id="signupPassword" name="password">
                                    <p class="password-visibility position-absolute end-0 top-50 translate-middle-y me-2" id="signupToggle">Show</p>
                                </div>
                                
                                <div class="form_group">
                                    <span>Confirm Password</span>
                                    <input type="password" id="confirm_password" name="confirm_password">
                                    <p class="password-visibility position-absolute end-0 top-50 translate-middle-y me-2" id="signupToggle1">Show</p>
                                </div>
                            </div>
                        </div>

                        <div class="form-group mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="checkbox" id="checkbox">
                            <label class="form-check-label" for="checkbox">I agree to the terms of service</label>
                        </div>

                        <!-- Display error message if any -->
                        <p class="text-danger" id="signupErrorMsg"></p>

                        <button type="submit" class="btn btn-primary btn-block mb-2 rounded-pill shadow-sm">Sign Up</button>
                    </form>
                </div>
                <div class="modal-footer justify-content-start">
                    <!-- Sign In link -->
                    <p>Already have an account? <a href="#" data-bs-dismiss="modal" id="signin">Sign In</a> </p>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JQuery code -->
    <script src="js/user_auth.js"></script>
</body>
</html>
